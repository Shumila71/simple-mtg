version: '3.8'

services:
  mtg-proxy:
    build: .
    container_name: mtg-proxy
    restart: unless-stopped
    ports:
      - "${PORT}:3128"
    environment:
      - DOMAIN=${DOMAIN}
      - PORT=${PORT}
    volumes:
      - mtg-config:/app/config
    networks:
      - mtg-network

volumes:
  mtg-config:
    driver: local

networks:
  mtg-network:
    driver: bridge