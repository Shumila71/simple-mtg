version: '3.8'

services:
  mtg-proxy:
    build: .
    container_name: mtg-proxy
    restart: unless-stopped
    ports:
      - "${PORT}:3128"
    environment:
      - DOMAIN=${DOMAIN}
      - PORT=${PORT}
    volumes:
      - mtg-config:/app/config
    networks:
      - mtg-network
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1

volumes:
  mtg-config:
    driver: local

networks:
  mtg-network:
    driver: bridge
    enable_ipv6: false